openapi: 3.0.3
info:
  title: Anthology API
  description: |
    ## Overview

    The Anthology API provides programmatic access to oral history conversations and their visual representation data.
    This API powers the Anthology visualization application, which displays interconnected conversations as an
    interactive graph where responses, questions, narratives, and speakers form a web of relationships.

    ### Key Concepts

    - **Anthology**: A collection of related conversations, typically from a specific project, community, or theme
    - **Conversation**: A recorded discussion containing multiple responses, questions, and narratives
    - **Response**: A segment of speech from a single speaker, the core content unit
    - **Question**: Facilitator prompts that elicit responses from participants
    - **Narrative**: Thematic groupings that connect related responses across a conversation
    - **Speaker**: A participant in a conversation with associated visual styling

    ### Data Relationships

    ```
    Anthology
      └── Conversations (1:many)
            ├── Speakers (1:many)
            ├── Questions (1:many)
            │     └── Responses (1:many via respondsToQuestionId)
            ├── Narratives (1:many)
            │     └── Responses (1:many via respondsToNarrativeId)
            └── Responses (1:many)
                  └── WordTimestamps (1:many, embedded)
    ```

    ## Authentication

    Most read operations are public and do not require authentication. Write operations (POST, PATCH, DELETE)
    require a valid Supabase JWT token passed in the Authorization header.

    ```
    Authorization: Bearer <your-supabase-jwt-token>
    ```

    Tokens are obtained through Supabase Auth. Contact the API administrator for access credentials.

    ## Pagination

    List endpoints support offset-based pagination with the following query parameters:

    | Parameter | Type | Default | Max | Description |
    |-----------|------|---------|-----|-------------|
    | `limit` | integer | 50 | 100 | Maximum items to return |
    | `offset` | integer | 0 | - | Number of items to skip |

    Response includes a `meta` object with pagination details:

    ```json
    {
      "data": [...],
      "meta": {
        "total": 150,
        "limit": 50,
        "offset": 0,
        "hasMore": true
      }
    }
    ```

    ## Error Handling

    All errors follow a consistent format:

    ```json
    {
      "error": {
        "code": "NOT_FOUND",
        "message": "Resource not found",
        "details": {}
      }
    }
    ```

    ### Error Codes

    | Code | HTTP Status | Description |
    |------|-------------|-------------|
    | `BAD_REQUEST` | 400 | Invalid request format |
    | `VALIDATION_ERROR` | 400 | Request validation failed |
    | `UNAUTHORIZED` | 401 | Missing or invalid authentication |
    | `FORBIDDEN` | 403 | Insufficient permissions |
    | `NOT_FOUND` | 404 | Resource does not exist |
    | `METHOD_NOT_ALLOWED` | 405 | HTTP method not supported |
    | `CONFLICT` | 409 | Resource conflict (e.g., duplicate) |
    | `INTERNAL_ERROR` | 500 | Server error |
    | `DATABASE_ERROR` | 500 | Database operation failed |
    | `SERVICE_UNAVAILABLE` | 503 | Service temporarily unavailable |

    ## Rate Limiting

    Currently no rate limits are enforced. This may change in future versions.

  version: 1.0.0
  contact:
    name: API Support
  license:
